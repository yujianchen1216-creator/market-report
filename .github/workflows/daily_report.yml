name: Daily Market Report

on:
  schedule:
    # 北京时间 07:00 = UTC 23:00（前日）— 美股收盘
    - cron: "0 23 * * *"
    # 北京时间 09:20 = UTC 01:20 — 盘前指引（仅工作日）
    - cron: "20 1 * * 1-5"
    # 北京时间 11:30 = UTC 03:30 — A股午盘
    - cron: "30 3 * * *"
    # 北京时间 15:00 = UTC 07:00 — A股收盘
    - cron: "0 7 * * *"
  workflow_dispatch:  # 支持手动触发
    inputs:
      report_type:
        description: "Report type"
        required: true
        default: "aclose"
        type: choice
        options:
          - midday
          - aclose
          - usclose
          - premarket

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests
          # Kronos dependencies
          pip install torch --extra-index-url https://download.pytorch.org/whl/cpu
          pip install einops huggingface_hub safetensors

      - name: Determine report type
        id: rtype
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "type=${{ inputs.report_type }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.schedule }}" == "0 23 * * *" ]]; then
            echo "type=usclose" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.schedule }}" == "20 1 * * 1-5" ]]; then
            echo "type=premarket" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.schedule }}" == "30 3 * * *" ]]; then
            echo "type=midday" >> $GITHUB_OUTPUT
          else
            echo "type=aclose" >> $GITHUB_OUTPUT
          fi

      - name: Generate report
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_APPSECRET: ${{ secrets.WECHAT_APPSECRET }}
        run: |
          python scheduled_report.py ${{ steps.rtype.outputs.type }}

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ steps.rtype.outputs.type }}
          path: reports/report_*.md
          retention-days: 7
